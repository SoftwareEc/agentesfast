<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentesFast | En construcción</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0, 255, 170, 0.18), transparent 35%),
        linear-gradient(135deg, #050816, #0b1020);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 760px;
      width: 100%;
      text-align: center;
      padding: 60px 30px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    .badge {
      display: inline-block;
      padding: 10px 18px;
      margin-bottom: 24px;
      border-radius: 999px;
      background: rgba(0, 255, 170, 0.12);
      color: #00ffaa;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(42px, 7vw, 78px);
      line-height: 1;
      margin-bottom: 22px;
      letter-spacing: -2px;
    }

    h1 span {
      color: #00ffaa;
    }

    p {
      max-width: 560px;
      margin: 0 auto 34px;
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.7;
    }

    .status {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .status div {
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      color: #e5e7eb;
      font-size: 15px;
    }

    .btn {
      display: inline-block;
      padding: 15px 28px;
      border-radius: 999px;
      background: #00ffaa;
      color: #051016;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 35px rgba(0, 255, 170, 0.35);
    }

    .footer {
      margin-top: 34px;
      color: #64748b;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 44px 22px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <main class="container">
    <div class="badge">Muy pronto</div>

    <h1>Agentes<span>Fast</span></h1>

    <p>
      Estamos construyendo una plataforma de agentes de inteligencia artificial
      para automatizar atención, reservas, ventas y procesos repetitivos de negocios.
    </p>

    <div class="status">
      <div>🤖 Agentes IA</div>
      <div>⚡ Automatización</div>
      <div>📲 Atención rápida</div>
    </div>

    <a class="btn" href="https://wa.me/593984328704" target="_blank">
      Contactar por WhatsApp
    </a>

    <div class="footer">
      agentesfast.com © 2026 — Sitio en construcción
    </div>
  </main>

</body>
</html>
